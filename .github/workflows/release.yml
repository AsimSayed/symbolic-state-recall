name: Release

# Push a version tag and everything else happens:
#   git tag v1.0.1 && git push origin v1.0.1
# -> builds a signed DMG, publishes a GitHub Release, and bumps the Homebrew cask.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release in this repo

jobs:
  release:
    runs-on: macos-15
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build signed DMG
        id: pkg
        run: bash scripts/package-dmg.sh "${{ steps.ver.outputs.version }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.pkg.outputs.dmg }}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" \
            "${{ steps.pkg.outputs.dmg }}" --clobber

      # Auto-update the Homebrew cask in AsimSayed/homebrew-tap.
      # Requires a repo secret HOMEBREW_TAP_TOKEN: a fine-grained PAT with
      # Contents: read/write on the homebrew-tap repo. If the secret is absent,
      # this step is skipped and the cask can be bumped with scripts/bump-cask.sh.
      - name: Bump Homebrew cask
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.pkg.outputs.sha256 }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/AsimSayed/homebrew-tap.git" tap
          CASK="tap/Casks/symbolic-state-recall.rb"
          /usr/bin/sed -i '' -E "s/version \".*\"/version \"${VERSION}\"/" "$CASK"
          /usr/bin/sed -i '' -E "s/sha256 \".*\"/sha256 \"${SHA256}\"/" "$CASK"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/symbolic-state-recall.rb
          git commit -m "symbolic-state-recall ${VERSION}"
          git push
